project:
  description: FXOS8700 Sensor Demo - FIFO Mode

  connections:
    - connect: FXOS8700 Sensor
      consumes:
        - FXOS8700_SENSOR
        - FXOS8700_I2C
        - STDOUT

  groups:
    - group: source
      files:
        - file: ../../../issdk_hal.h
        - file: fxos8700_fifo.c

  components:
    - component: Sensors:sensors:issdk_fxos8700
    - component: Sensors:drivers:issdk_interfaces
    - component: Sensors:utils:systick_utils

  layers:
    - layer: $Board-Layer$
      type: Board
    - layer: $Shield-Layer$
      type: Shield
